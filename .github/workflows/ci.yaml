name: CI

on:
  - push
  - pull_request

jobs:
  test:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Cache Homebrew packages and casks
        uses: actions/cache@v6
        with:
          path: |
            /home/linuxbrew/.linuxbrew/Homebrew
            /home/linuxbrew/.linuxbrew/Cellar
            /home/linuxbrew/.linuxbrew/Caskroom
            /home/linuxbrew/.cache/Homebrew
            ~/.local/share/fonts
          key: ${{ runner.os }}-brew-fonts-${{ hashFiles('.github/workflows/CI.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-fonts-
      - name: Install fonts
        run: |
          # Check if fonts are already installed
          if ! brew list --cask font-libertinus &>/dev/null; then
              brew install --cask font-{linux-{libertine,biolinum},libertinus{,-{sans,serif,serif-display}},source-{serif-4,sans-3},tex-gyre-{adventor,bonum,chorus,cursor,heros,pagella,schola,termes{,-math}},arial{,-black},new-computer-modern,computer-modern,inconsolata}
          else
              echo "Fonts already installed, skipping..."
          fi
      - name: Install Typst
        uses: typst-community/setup-typst@v5
      - name: Install Task
        uses: go-task/setup-task@v2
      - name: Build templates
        run: task all
      - name: Upload page artifacts
        uses: actions/upload-pages-artifact@v5
        run: task www
        with:
          path: www
      - name: README
        run: |
          sudo gem install asciidoctor
          asciidoctor README.adoc -o www/index.html
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7
